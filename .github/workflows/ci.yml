name: Veona CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  agent-tests:
    name: Agent Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go tests
        run: cd agent && go test ./...

  server-tests:
    name: Server Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: cd server && npm install
      - name: Run TypeScript tests
        run: cd server && npm exec vitest run

  build-agent:
    name: Build Agent
    needs: agent-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows]
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Agent
        run: |
          cd agent
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o veona-agent-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/veona-agent/main.go

  build-docker:
    name: Build Docker Image
    needs: server-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: veona-server:latest
