name: Create Release from Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section to file
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          CHANGELOG_FILE="CHANGELOG.md"
          RELEASE_FILE="release_body.md"

          # Find the section matching ## [X.Y.Z] - YYYY-MM-DD
          START=$(grep -n "^## \[$VERSION\]" "$CHANGELOG_FILE" | head -1 | cut -d: -f1)

          if [ -z "$START" ]; then
            echo "::error::Section for version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

          # Find the next version section (or end of file)
          TOTAL_LINES=$(wc -l < "$CHANGELOG_FILE")
          NEXT=$(tail -n +$((START + 1)) "$CHANGELOG_FILE" | grep -n "^## \[" | head -1 | cut -d: -f1)

          if [ -z "$NEXT" ]; then
            END=$TOTAL_LINES
          else
            END=$((START + NEXT - 2))
          fi

          # Write to file
          sed -n "${START},${END}p" "$CHANGELOG_FILE" > "$RELEASE_FILE"

          echo "Extracted $(wc -l < "$RELEASE_FILE") lines from CHANGELOG.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          generate_release_notes: false