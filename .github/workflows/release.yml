name: Create Release from Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release body from CHANGELOG
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          FILE="CHANGELOG.md"
          OUTFILE="release_body.md"

          # Find the line number of ## [X.Y.Z] - YYYY-MM-DD
          START=$(grep -n "^## \[$VERSION\]" "$FILE" | cut -d: -f1 | head -1)

          if [ -z "$START" ]; then
            echo "::error::Section for version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

          # Find next section (if any). grep returns 1 when not found, we ignore it.
          NEXT_LINE=$(tail -n +$((START + 1)) "$FILE" | grep -n "^## \[" | cut -d: -f1 | head -1 || true)

          if [ -z "$NEXT_LINE" ]; then
            # Last section: take from START to end of file
            sed -n "${START},\$p" "$FILE" > "$OUTFILE"
          else
            END=$((START + NEXT_LINE - 2))
            sed -n "${START},${END}p" "$FILE" > "$OUTFILE"
          fi

          echo "Extracted $(wc -l < "$OUTFILE") lines from CHANGELOG.md for version $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          generate_release_notes: false