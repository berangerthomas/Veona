name: Create Release from Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          CHANGELOG_FILE="CHANGELOG.md"

          # Find the section matching the version
          # Format: ## [X.Y.Z] - YYYY-MM-DD
          START=$(grep -n "^## \[$VERSION\]" "$CHANGELOG_FILE" | head -1 | cut -d: -f1)

          if [ -z "$START" ]; then
            echo "error=Section for version $VERSION not found in CHANGELOG.md" >> "$GITHUB_OUTPUT"
            echo "Section not found"
            exit 1
          fi

          # Find the next version section (or end of file)
          NEXT=$(tail -n +$((START + 1)) "$CHANGELOG_FILE" | grep -n "^## \[" | head -1 | cut -d: -f1)

          if [ -z "$NEXT" ]; then
            # No next section, take everything from START to EOF
            BODY=$(tail -n +$START "$CHANGELOG_FILE")
          else
            # Take lines between START and the next section
            END=$((START + NEXT - 1))
            BODY=$(sed -n "${START},${END}p" "$CHANGELOG_FILE")
          fi

          # Output the body
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false