services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - victoriametrics
      - grafana

  server:
    build: 
      context: ../server
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - VICTORIA_METRICS_URL=http://victoriametrics:8428/api/v1/import/prometheus
    depends_on:
      - victoriametrics
    volumes:
      - veona-sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.93.0
    expose:
      - "8428"
    volumes:
      - vm-data:/victoria-metrics-data
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--retentionPeriod=1y"
    healthcheck:
      disable: true

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/veona-overview.json
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - victoriametrics

volumes:
  veona-sqlite-data:
  vm-data:
  grafana-storage:
