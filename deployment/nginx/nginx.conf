events {
    worker_connections 1024;
}

http {
    upstream veona_server {
        server server:3000;
    }

    upstream victoria_metrics {
        server victoriametrics:8428;
    }

    server {
        listen 80;
        server_name localhost;

        # Main Ingestion API
        location /api/ {
            proxy_pass http://veona_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check for the stack
        location /health {
            proxy_pass http://veona_server/health;
        }

        # VictoriaMetrics UI and API (optional exposure)
        location /vmui/ {
            proxy_pass http://victoria_metrics/vmui/;
        }

        location /api/v1/query {
            proxy_pass http://victoria_metrics/api/v1/query;
        }

        # Health check for Nginx itself
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
